name: validate

on:
  push:
  pull_request:

jobs:
  patch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["1.3.13", "1.3.14", "1.3.15", "1.3.16", "1.3.17", "1.4.0", "1.4.1"]

    steps:
      - uses: actions/checkout@v4

      - name: Load manifest
        id: manifest
        run: |
          source ./manifest.sh
          echo "tag=$(resolve_upstream_tag '${{ matrix.version }}')" >> "$GITHUB_OUTPUT"

      - name: Clone OpenCode
        run: git clone --depth 1 --branch "${{ steps.manifest.outputs.tag }}" https://github.com/anomalyco/opencode.git opencode-src

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Apply TPS auto-patch
        run: bun ./scripts/apply-opencode-tps-patch.mjs ./opencode-src "${{ matrix.version }}"

      - name: Install dependencies
        working-directory: opencode-src
        run: bun install --frozen-lockfile

      - name: Typecheck patched opencode
        working-directory: opencode-src/packages/opencode
        run: bun run typecheck
